<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Đăng ký - SecureEdu</title>

		<link rel="stylesheet" href="../css/auth.css" />

		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
		/>
	</head>

	<body>
		<div class="container">

			<div class="left">
				<h1>SecureEdu</h1>
				<p>Tạo tài khoản để truy cập hệ thống quản lý sinh viên.</p>
			</div>

			<div class="right">

				<a href="../index.html" class="home-btn" aria-label="a">
					<i class="fa-solid fa-arrow-left"></i>
				</a>

				<form class="form-box" onsubmit="register(event)">

					<h2>Đăng ký</h2>

					<div class="input-group">
						<i class="fa-solid fa-user"></i>
						<input
							type="text"
							id="fullName"
							placeholder="Họ và tên"
							required
						/>
					</div>

					<div class="input-group">
						<i class="fa-solid fa-envelope"></i>
						<input
							type="email"
							id="email"
							placeholder="Email"
							required
						/>
					</div>

					<div class="input-group">
						<i class="fa-solid fa-lock"></i>
						<input
							type="password"
							id="password"
							placeholder="Mật khẩu"
							required
						/>
					</div>

					<div class="input-group">
						<i class="fa-solid fa-lock"></i>
						<input
							type="password"
							id="confirmPassword"
							placeholder="Xác nhận mật khẩu"
							required
						/>
					</div>

					<div class="input-group">
						<i class="fa-solid fa-user-shield"></i>

						<select id="role" required aria-label="chọn">
							<option value="">Chọn vai trò</option>
							<option value="student">Sinh viên</option>
							<option value="teacher">Giảng viên</option>
						</select>
					</div>

					<button type="submit">
						Đăng ký
					</button>

					<p>
						Đã có tài khoản?
						<a href="login.html">Đăng nhập</a>
					</p>

				</form>

			</div>

		</div>

		<script src="../js/auth.js"></script>

	</body>
</html>
