<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Quên mật khẩu - SecureEdu</title>

		<link rel="stylesheet" href="../css/auth.css" />

		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
		/>
	</head>

	<body>
		<div class="container">
			<div class="left">
				<h1>SecureEdu</h1>

				<p>
					Xác minh danh tính bằng Email và mã OTP để tiếp tục khôi phục mật
					khẩu.
				</p>
			</div>

			<div class="right">
				<a
					href="../index.html"
					class="home-btn"
					aria-label="Quay lại trang chủ"
				>
					<i class="fa-solid fa-arrow-left"></i>
				</a>

				<form class="form-box" id="otpForm">
					<h2>Xác minh OTP</h2>

					<div class="input-group">
						<i class="fa-solid fa-envelope"></i>
						<input type="email" id="email" placeholder="Nhập Email" required />
					</div>

					<div class="input-group">
						<i class="fa-solid fa-key"></i>
						<input type="text" id="otp" placeholder="Nhập mã OTP" required />
					</div>
					<button type="button" class="otp-btn">Gửi mã OTP</button>
					<button type="submit">Xác minh OTP</button>

					<p>
						Đã nhớ mật khẩu?
						<a href="login.html">Đăng nhập ngay</a>
					</p>
				</form>
			</div>
		</div>

		<script>
			// Gửi OTP

			document.querySelector(".otp-btn").addEventListener("click", async () => {
				const email = document.getElementById("email").value;

				if (!email) {
					alert("Vui lòng nhập email");
					return;
				}

				const response = await fetch(
					"http://localhost:5000/api/auth/forgot-password",
					{
						method: "POST",
						headers: {
							"Content-Type": "application/json",
						},
						body: JSON.stringify({
							email,
						}),
					},
				);

				const data = await response.json();

				alert(data.message);
			});

			// Xác minh OTP

			document
				.getElementById("otpForm")
				.addEventListener("submit", async (e) => {
					e.preventDefault();

					const email = document.getElementById("email").value;

					const otp = document.getElementById("otp").value;

					const response = await fetch(
						"http://localhost:5000/api/auth/verify-otp",
						{
							method: "POST",
							headers: {
								"Content-Type": "application/json",
							},
							body: JSON.stringify({
								email,
								otp,
							}),
						},
					);

					const data = await response.json();

					if (response.ok) {
						localStorage.setItem("otpVerified", "true");

						localStorage.setItem("resetEmail", email);

						window.location.href = "reset-password.html";
					} else {
						alert(data.message);
					}
				});
		</script>
	</body>
</html>
