<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tài khoản - SecureEdu</title>

    <link rel="stylesheet" href="../css/account-management.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <div class="container">

        <div class="header">

            <h1>
                <i class="fa-solid fa-users"></i>
                Quản lý tài khoản
            </h1>

            <a href="admin-dashboard.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
                Dashboard
            </a>

        </div>

        <div class="toolbar">

            <button class="add-btn">
                <i class="fa-solid fa-user-plus"></i>
                Thêm tài khoản
            </button>

            <div class="search-box">
                <input type="text"
                    placeholder="Tìm kiếm tài khoản...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

        </div>

        <div class="table-container">

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Họ tên</th>
                        <th>Email</th>
                        <th>Vai trò</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>

                        <td>1</td>
                        <td>Admin System</td>
                        <td>admin@secureedu.com</td>

                        <td>
                            <span class="role admin">
                                Admin
                            </span>
                        </td>

                        <td>
                            <span class="status active">
                                Hoạt động
                            </span>
                        </td>

                        <td>

                            <button class="edit-btn" aria-label="Sửa thông tin">
                                <i class="fa-solid fa-pen"></i>
                            </button>

                            <button class="lock-btn" aria-label="Xem thông tin">
                                <i class="fa-solid fa-lock"></i>
                            </button>

                            <button class="delete-btn" aria-label="Xóa thông tin">
                                <i class="fa-solid fa-trash"></i>
                            </button>

                        </td>

                    </tr>

                    <tr>

                        <td>2</td>
                        <td>Nguyễn Văn A</td>
                        <td>vana@gmail.com</td>

                        <td>
                            <span class="role teacher">
                                Giảng viên
                            </span>
                        </td>

                        <td>
                            <span class="status active">
                                Hoạt động
                            </span>
                        </td>

                        <td>

                            <button class="edit-btn" aria-label="Sửa thông tin">
                                <i class="fa-solid fa-pen"></i>
                            </button>

                            <button class="lock-btn" aria-label="Xem thông tin">
                                <i class="fa-solid fa-lock"></i>
                            </button>

                            <button class="delete-btn" aria-label="Xóa thông tin">
                                <i class="fa-solid fa-trash"></i>
                            </button>

                        </td>

                    </tr>

                    <tr>

                        <td>3</td>
                        <td>Trần Văn B</td>
                        <td>tranb@gmail.com</td>

                        <td>
                            <span class="role student">
                                Sinh viên
                            </span>
                        </td>

                        <td>
                            <span class="status locked">
                                Đã khóa
                            </span>
                        </td>

                        <td>

                            <button class="edit-btn" aria-label="Sửa thông tin">
                                <i class="fa-solid fa-pen"></i>
                            </button>

                            <button class="lock-btn" aria-label="Xem thông tin">
                                <i class="fa-solid fa-lock"></i>
                            </button>

                            <button class="delete-btn" aria-label="Xóa thông tin">
                                <i class="fa-solid fa-trash"></i>
                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</body>

</html>
