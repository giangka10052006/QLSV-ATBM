<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Quản lý sinh viên - SecureEdu</title>

		<link rel="stylesheet" href="../css/student-management.css" />

		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
		/>
	</head>

	<body>
		<div class="container">
			<div class="header">
				<h1>
					<i class="fa-solid fa-user-graduate"></i>
					Quản lý sinh viên
				</h1>

				<a href="admin-dashboard.html" class="back-btn">
					<i class="fa-solid fa-arrow-left"></i>
					Dashboard
				</a>
			</div>

			<div class="toolbar">
				<button class="add-btn" onclick="addStudent()">
					<i class="fa-solid fa-plus"></i>
					Thêm sinh viên
				</button>

				<div class="search-box">
					<input type="text" placeholder="Tìm kiếm sinh viên..." />
					<i class="fa-solid fa-magnifying-glass"></i>
				</div>
			</div>

			<div class="table-container">
				<table>
					<thead>
						<tr>
							<th>Mã SV</th>
							<th>Họ tên</th>
							<th>Lớp</th>
							<th>Email</th>
							<th>SĐT</th>
							<th>Thao tác</th>
						</tr>
					</thead>

					<tbody id="studentTable"></tbody>
				</table>
			</div>
		</div>
		<script src="../js/student.js"></script>
	</body>
</html>
